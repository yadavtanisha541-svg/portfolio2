<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 90" width="90" height="90">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff7a00"/>
      <stop offset="100%" style="stop-color:#9b51e0"/>
    </linearGradient>
    <linearGradient id="letterG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#ffe0cc"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#9b51e0" flood-opacity="0.5"/>
    </filter>
    <clipPath id="hexClip">
      <polygon points="45,4 82,23 82,67 45,86 8,67 8,23"/>
    </clipPath>
  </defs>

  <!-- Hexagon background -->
  <polygon points="45,4 82,23 82,67 45,86 8,67 8,23"
    fill="url(#bgG)" filter="url(#softShadow)"/>

  <!-- Inner hexagon border -->
  <polygon points="45,11 76,27 76,63 45,79 14,63 14,27"
    fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- Letter T — clean bold white -->
  <!-- Top horizontal bar -->
  <rect x="20" y="25" width="50" height="11" rx="4" fill="url(#letterG)"/>
  <!-- Vertical stem -->
  <rect x="34.5" y="36" width="21" height="30" rx="4" fill="url(#letterG)"/>
</svg>
